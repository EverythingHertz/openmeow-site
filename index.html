<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OpenMeow — The Observatory</title>
<meta name="description" content="Scroll the tower from empty shell to a full staff of agents — then step onto every floor. OpenMeow: open-source observability for AI agents." />
<meta property="og:title" content="OpenMeow — open-source observability for AI agents" />
<meta property="og:description" content="Scroll the tower from empty shell to a full staff of agents — then step onto every floor. Coming soon." />
<meta property="og:image" content="https://openmeow.io/og.jpg" />
<meta property="og:url" content="https://openmeow.io/" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="theme-color" content="#0B0A09" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='55' r='30' fill='%23F2B366'/><path d='M24 34 L30 11 L47 29 Z M76 34 L70 11 L53 29 Z' fill='%23F2B366'/><circle cx='40' cy='53' r='4' fill='%23140F0A'/><circle cx='60' cy='53' r='4' fill='%23140F0A'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0B0A09; --ink: #F4EFE7; --muted: #9A8F82; --faint: #6A6157;
    --gold: #F2B366; --gold-hi: #FFD9A0;
    --teal-hi: #86F1E7; --teal: #33D6C8; --teal-lo: #15AEA4;
    --display: 'Space Grotesk', system-ui, sans-serif;
    --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    --mono: ui-monospace, 'SF Mono', Menlo, monospace;
    --ease: cubic-bezier(.22,1,.36,1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  ::selection { background: rgba(51,214,200,.30); color: #EAFFFB; }
  html { scroll-behavior: auto; }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  #track { height: 1250vh; position: relative; }
  #stage { position: sticky; top: 0; height: 100vh; height: 100svh; overflow: hidden; background: var(--bg); }
  #stage video, #stage img.layer {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; opacity: 0;
  }
  .vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(120% 90% at 50% 45%, transparent 56%, rgba(5,4,3,.5) 100%),
                linear-gradient(to bottom, rgba(5,4,3,.22), transparent 13% 86%, rgba(5,4,3,.4));
  }
  .grain { position: absolute; inset: 0; pointer-events: none; opacity: .05; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.92' numOctaves='2'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='.6'/></svg>");
  }
  #loader {
    position: absolute; inset: 0; z-index: 30; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px; background: var(--bg);
    transition: opacity .8s var(--ease), visibility .8s;
  }
  #loader.done { opacity: 0; visibility: hidden; }
  #loader .mark { font-family: var(--display); font-weight: 700; font-size: 30px; letter-spacing: -.04em; }
  #loader .mark .m { background: linear-gradient(115deg, var(--teal-lo), var(--teal) 45%, var(--teal-hi)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  #loader .bar { width: 200px; height: 2px; background: rgba(244,239,231,.12); border-radius: 2px; overflow: hidden; }
  #loader .bar i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), var(--teal)); transition: width .4s var(--ease); }
  #loader .hint { font-family: var(--mono); font-size: 11px; letter-spacing: .08em; color: var(--faint); text-transform: uppercase; }
  #cards { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
  .card {
    position: absolute; left: clamp(20px, 5vw, 76px); bottom: clamp(26px, 8vh, 90px);
    max-width: min(460px, 84vw);
    opacity: 0; transform: translateY(14px);
    transition: opacity .55s var(--ease), transform .55s var(--ease);
  }
  .card.on { opacity: 1; transform: none; }
  .card .eyebrow {
    font-family: var(--mono); font-size: clamp(10px, 1.1vw, 12px);
    letter-spacing: .16em; text-transform: uppercase; color: var(--teal);
    margin-bottom: 10px;
  }
  .card h2 {
    font-family: var(--display); font-weight: 700;
    font-size: clamp(26px, 3.6vw, 44px); letter-spacing: -.03em; line-height: 1.05;
    text-shadow: 0 2px 26px rgba(5,4,3,.9), 0 1px 3px rgba(5,4,3,.9);
  }
  .card p {
    margin-top: 10px; color: rgba(244,239,231,.87);
    font-size: clamp(14px, 1.5vw, 17px); line-height: 1.5; max-width: 42ch;
    text-shadow: 0 1px 14px rgba(5,4,3,.9);
  }
  #finale {
    position: absolute; inset: 0; z-index: 20; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; pointer-events: none;
    opacity: 0; transition: opacity .9s var(--ease);
    background: radial-gradient(62% 54% at 50% 46%, rgba(5,4,3,.62), rgba(5,4,3,.16) 66%, transparent);
  }
  #finale.on { opacity: 1; }
  .wordmark { font-family: var(--display); font-weight: 700; font-size: clamp(44px, 8.5vw, 108px); letter-spacing: -.045em; line-height: 1; display: flex; align-items: baseline; filter: drop-shadow(0 6px 40px rgba(51,214,200,.25)); }
  .wordmark .meow { background: linear-gradient(115deg, var(--teal-lo), var(--teal) 45%, var(--teal-hi)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .wordmark .dot { width: .16em; height: .16em; margin-left: .07em; border-radius: 50%; background: radial-gradient(circle at 34% 30%, var(--gold-hi), var(--gold)); box-shadow: 0 0 18px rgba(242,179,102,.7); align-self: flex-end; margin-bottom: .09em; }
  .coming {
    font-family: var(--display); font-weight: 600; font-size: clamp(17px, 2.5vw, 26px);
    background: linear-gradient(100deg, #34E0D0, #7DF0EA 22%, #EAFEFF 50%, #93E0FF 74%, #46B4F2);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 2px 18px rgba(70,180,242,.4));
  }
  #fparade { position: absolute; left: 0; right: 0; bottom: max(3.5vh, env(safe-area-inset-bottom, 0px)); pointer-events: none; }
  .prow { overflow: hidden; -webkit-mask-image: linear-gradient(90deg, transparent, #000 9%, #000 91%, transparent); mask-image: linear-gradient(90deg, transparent, #000 9%, #000 91%, transparent); }
  .ptrack { display: flex; gap: clamp(10px, 1.6vw, 18px); width: max-content; animation-timing-function: linear; animation-iteration-count: infinite; animation-play-state: paused; }
  #finale.on .ptrack { animation-play-state: running; }
  .prow.far .ptrack { animation-name: pslideR; animation-duration: 150s; }
  .prow.near .ptrack { animation-name: pslideL; animation-duration: 110s; margin-top: clamp(6px, 1vh, 12px); }
  .ptrack img { width: clamp(52px, 6.5vw, 92px); height: clamp(52px, 6.5vw, 92px); flex: none; -webkit-mask-image: radial-gradient(circle, #000 52%, transparent 76%); mask-image: radial-gradient(circle, #000 52%, transparent 76%); }
  .prow.far img { width: clamp(40px, 5vw, 70px); height: clamp(40px, 5vw, 70px); }
  .prow.far { opacity: .32; }
  .prow.near { opacity: .48; }
  @keyframes pslideL { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes pslideR { from { transform: translateX(-50%); } to { transform: translateX(0); } }
  #hint {
    position: absolute; left: 50%; bottom: 26px; transform: translateX(-50%);
    z-index: 12; display: flex; flex-direction: column; align-items: center; gap: 7px;
    font-family: var(--mono); font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
    color: rgba(244,239,231,.6); transition: opacity .5s var(--ease);
  }
  #hint .chev { width: 10px; height: 10px; border-right: 1.6px solid rgba(242,179,102,.9); border-bottom: 1.6px solid rgba(242,179,102,.9); transform: rotate(45deg); animation: chev 1.7s infinite var(--ease); }
  @keyframes chev { 0%,100% { transform: rotate(45deg) translate(0,0); opacity: .55; } 50% { transform: rotate(45deg) translate(4px,4px); opacity: 1; } }
  #hint.off { opacity: 0; }
  #intro {
    position: absolute; inset: 0; z-index: 22;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 16px; pointer-events: none;
    background: radial-gradient(70% 60% at 50% 44%, rgba(5,4,3,.72), rgba(5,4,3,.28) 62%, rgba(5,4,3,.08));
    transition: opacity .6s var(--ease), visibility .6s;
  }
  #intro.off { opacity: 0; visibility: hidden; }
  #intro .big {
    font-family: var(--display); font-weight: 700;
    font-size: clamp(40px, 7.5vw, 96px); letter-spacing: -.04em; line-height: 1.02;
    display: flex; align-items: baseline;
    filter: drop-shadow(0 6px 40px rgba(0,0,0,.7));
  }
  #intro .big .meow { background: linear-gradient(115deg, var(--teal-lo), var(--teal) 45%, var(--teal-hi)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  #intro h1 {
    font-family: var(--display); font-weight: 700;
    font-size: clamp(22px, 3.2vw, 40px); letter-spacing: -.02em; color: var(--gold-hi);
    text-shadow: 0 2px 24px rgba(0,0,0,.8);
  }
  #intro p {
    max-width: 46ch; color: rgba(244,239,231,.85);
    font-size: clamp(14px, 1.6vw, 18px); line-height: 1.55;
    text-shadow: 0 1px 14px rgba(0,0,0,.85);
  }
  #begin {
    pointer-events: auto; cursor: pointer; margin-top: 14px;
    display: inline-flex; align-items: center; gap: 12px;
    font-family: var(--display); font-weight: 600; font-size: clamp(15px, 1.7vw, 19px);
    color: #06201D; background: linear-gradient(115deg, var(--teal-hi), var(--teal));
    border: none; border-radius: 999px; padding: 15px 30px;
    box-shadow: 0 8px 34px rgba(51,214,200,.4), inset 0 1px 0 rgba(255,255,255,.5);
    animation: pulsebtn 2.2s var(--ease) infinite;
  }
  #begin .bchev { width: 11px; height: 11px; border-right: 2.2px solid #06201D; border-bottom: 2.2px solid #06201D; transform: rotate(45deg) translate(-1px,-1px); animation: chev 1.7s infinite var(--ease); }
  @keyframes pulsebtn { 0%,100% { transform: scale(1); box-shadow: 0 8px 34px rgba(51,214,200,.4), inset 0 1px 0 rgba(255,255,255,.5); } 50% { transform: scale(1.045); box-shadow: 0 10px 44px rgba(51,214,200,.62), inset 0 1px 0 rgba(255,255,255,.5); } }
  #rail { position: fixed; right: clamp(10px, 2vw, 26px); top: 50%; transform: translateY(-50%); z-index: 40; display: flex; flex-direction: column; gap: 12px; }
  #rail button {
    width: 9px; height: 9px; border-radius: 50%; border: 1px solid rgba(244,239,231,.3);
    background: transparent; cursor: pointer; padding: 0;
    transition: background .3s, border-color .3s, box-shadow .3s, transform .3s;
  }
  #rail button.on { background: var(--teal); border-color: var(--teal); box-shadow: 0 0 10px rgba(51,214,200,.7); transform: scale(1.3); }
  #fallback { display: none; }
  @media (max-width: 640px) {
    .card { left: 18px; right: 18px; bottom: max(22px, env(safe-area-inset-bottom, 0px) + 18px); max-width: none; }
    .card h2 { font-size: 27px; }
    .card p { font-size: 14px; }
    #rail { right: 8px; gap: 14px; }
    #rail button { width: 12px; height: 12px; }
    #intro { gap: 13px; padding: 0 22px; }
    #intro p { font-size: 14px; }
    #begin { padding: 16px 34px; font-size: 17px; }
    #finale .coming, .coming { font-size: 19px; }
    #hint { bottom: max(20px, env(safe-area-inset-bottom, 0px) + 14px); }
  }
  @media (prefers-reduced-motion: reduce) {
    #track, #rail, #hint { display: none; }
    #fallback { display: block; padding: 8vh 6vw; }
    #fallback section { max-width: 940px; margin: 0 auto 9vh; }
    #fallback img { width: 100%; height: auto; border-radius: 14px; box-shadow: 0 18px 60px rgba(0,0,0,.5); }
    #fallback .card { position: static; opacity: 1; transform: none; margin-bottom: 18px; }
  }
</style>
</head>
<body>
<div id="track">
  <div id="stage">
    <div class="vignette"></div>
    <div class="grain"></div>
    <div id="loader"><div class="mark">Open<span class="m">Meow</span></div><div class="bar"><i id="lbar"></i></div><div class="hint" id="lhint">Unlocking the observatory</div></div>
    <div id="cards"></div>
    <div id="finale">
      <div class="wordmark"><span>Open</span><span class="meow">Meow</span><span class="dot" aria-hidden="true"></span></div>
      <div class="coming">Coming&nbsp;soon</div>
      <div id="fparade" aria-hidden="true"><div class="prow far"><div class="ptrack"></div></div><div class="prow near"><div class="ptrack"></div></div></div>
    </div>
    <div id="hint"><span>Scroll</span><span class="chev" aria-hidden="true"></span></div>
    <div id="intro">
      <div class="big"><span>Open</span><span class="meow">Meow</span></div>
      <h1>The Observatory: a guided tour</h1>
      <p>One empty tower. A full staff of AI agents about to move in. Scroll to watch it come alive — then step onto every floor.</p>
      <button id="begin" type="button"><span>Scroll to begin</span><span class="bchev" aria-hidden="true"></span></button>
    </div>
  </div>
</div>
<div id="rail" aria-label="Tour progress"></div>
<div id="fallback"></div>
<script>
(() => {
  const CDN = 'https://d8j0ntlcm91z4.cloudfront.net/user_3DlCVdjo8RXELA5Sxeob2Uxh8GX/';
  const IMGS = [
    'hf_20260519_204356_76115971-1cc1-4a4e-b6a3-70a63bf058d9_min.webp',
    'hf_20260715_042856_3ef1ae40-fb2d-4046-ab4f-42f909180bfd_min.webp'
  ];
  const VIDS = [
    { file: 'hf_20260715_060008_237283a7-2399-405f-9042-4684859f77db.mp4', dur: 8 },
    { file: 'hf_20260715_060010_6fa2372c-ff19-406f-923a-afe400edf2f5.mp4', dur: 10 },
    { file: 'hf_20260715_052639_f9ff5220-3aec-4459-be97-20792ed2e891.mp4', dur: 8 },
    { file: 'hf_20260715_052642_30566d21-b19e-445e-b8e0-7859385e22c7.mp4', dur: 8 },
    { file: 'hf_20260715_051809_b9be0f73-0c86-423b-9221-6271a645e796.mp4', dur: 8 },
    { file: 'hf_20260715_051816_1fa564f5-8d78-45ca-afbe-a41d450f4c7d.mp4', dur: 8 },
    { file: 'hf_20260715_051813_7ff1175e-e6ec-4bd1-9f88-66d7df9e48fe.mp4', dur: 8 }
  ];
  const VIDS_P = [
    'hf_20260715_163114_70ccdee8-c679-4eb9-a123-a7739b1105b4.mp4', 'hf_20260715_155619_68cf50d0-a057-4f5f-a116-c25cedb3c90d.mp4', 'hf_20260715_163308_65b22dc3-5de0-41a1-aa9f-02919eb6cd19.mp4', 'hf_20260715_163325_d8396a90-6438-4415-811e-e9bc6fe0cce5.mp4', 'hf_20260715_164927_e8a0adfc-d474-426a-9ecf-2d1c2e4bf087.mp4', 'hf_20260715_051816_1fa564f5-8d78-45ca-afbe-a41d450f4c7d.mp4', 'hf_20260715_165810_c3af5a21-fce5-422a-ac5c-0cd7cbab395c.mp4'
  ];
  const PORTRAIT = innerHeight > innerWidth * 1.15;
  if (PORTRAIT) VIDS.forEach((v, i) => { v.file = VIDS_P[i]; });
  const ZOOMS = [
    'hf_20260715_051800_8efda7ef-fea4-4b73-ab7f-8b7d05e5801f_min.webp',
    'hf_20260715_051805_de5a9386-1fe0-47d9-ab94-784f0ded5cfe_min.webp',
    'hf_20260715_043327_1a46b86a-442d-4d7f-b692-1a3e4502fd34_min.webp',
    'hf_20260715_043340_992b6a20-61fa-4828-887a-9a09c868d964_min.webp',
    'hf_20260715_043336_83283dde-d603-4f46-a70e-da62819c3675_min.webp'
  ];
  const COPY = [
    { eyebrow: 'Overture', title: 'Every system needs a conductor.', body: 'The baton is up. Keep scrolling.' },
    { eyebrow: 'Move-in day', title: 'Your agent staff, installed.', body: 'Every floor a system. Every desk a specialist. Lights on.' },
    { eyebrow: 'Execution', title: 'Tool calls, on the record.', body: 'The toolsmith logs every call, so you never wonder what actually ran.' },
    { eyebrow: 'Cost', title: 'Every token, weighed.', body: 'The kibble budget balances itself — and shows its work.' },
    { eyebrow: 'Evals', title: 'Nothing ships un-judged.', body: 'The approval gate holds until the gavel comes down.' },
    { eyebrow: 'Memory', title: 'Secrets stay vaulted.', body: 'Keys, prompts, state — locked up tighter than the phantom mouse.' },
    { eyebrow: 'Observability', title: 'The whole system, watched.', body: 'From up here, you can see every trace land.' }
  ];
  const SEGS = [
    PORTRAIT ? { v: 0, hold: 1, at: 0, w: .45 } : { img: 0, w: .45 },
    { v: 0, dir: 1, w: .8 },   { v: 0, hold: 1, w: .35, card: 0 },
    { v: 1, dir: 1, w: 1.3 },
    PORTRAIT ? { v: 1, hold: 1, w: .5, card: 1 } : { img: 1, w: .5, card: 1 },
    { v: 2, dir: 1, w: .85 },  { v: 2, hold: 1, w: .45, card: 2 },  { v: 2, dir: -1, w: .65 },
    { v: 3, dir: 1, w: .85 },  { v: 3, hold: 1, w: .45, card: 3 },  { v: 3, dir: -1, w: .65 },
    { v: 4, dir: 1, w: .85 },  { v: 4, hold: 1, w: .45, card: 4 },  { v: 4, dir: -1, w: .65 },
    { v: 5, dir: 1, w: .85 },  { v: 5, hold: 1, w: .45, card: 5 },  { v: 5, dir: -1, w: .65 },
    { v: 6, dir: 1, w: 1.0 },  { v: 6, hold: 1, w: .55, card: 6 },
    { v: 6, hold: 1, w: .45 }
  ];
  const RAIL = [
    { label: 'Empty shell', seg: 0 }, { label: 'Overture', seg: 2 }, { label: 'Build-out', seg: 3 },
    { label: 'The tower', seg: 4 },
    { label: 'Tool Calls', seg: 6 }, { label: 'Kibble Budget', seg: 9 }, { label: 'Approval Gate', seg: 12 },
    { label: 'Phantom Vault', seg: 15 }, { label: 'Rooftop', seg: 18 }, { label: 'Coming soon', seg: 19 }
  ];
  const FIN_SEG = 19;
  const rm = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const stage = document.getElementById('stage');
  const loader = document.getElementById('loader');
  const lbar = document.getElementById('lbar');
  const lhint = document.getElementById('lhint');
  const cardsEl = document.getElementById('cards');
  const finale = document.getElementById('finale');
  const hint = document.getElementById('hint');
  const rail = document.getElementById('rail');
  if (rm) {
    const fb = document.getElementById('fallback');
    const shots = [CDN + IMGS[0], CDN + IMGS[1], ...ZOOMS.map(z => CDN + z)];
    COPY.forEach((c, i) => {
      const s = document.createElement('section');
      s.innerHTML = `<div class="card on"><div class="eyebrow">${c.eyebrow}</div><h2>${c.title}</h2><p>${c.body}</p></div><img src="${shots[i]}" alt="" loading="lazy" />`;
      fb.appendChild(s);
    });
    const end = document.createElement('section');
    end.innerHTML = `<div class="card on"><h2>OpenMeow.</h2><p>Coming soon.</p></div>`;
    fb.appendChild(end);
    loader.classList.add('done');
    return;
  }
  const imgEls = IMGS.map(f => {
    const im = document.createElement('img');
    im.className = 'layer'; im.decoding = 'async'; im.src = CDN + f;
    stage.insertBefore(im, stage.querySelector('.vignette'));
    return im;
  });
  const vidEls = VIDS.map(() => {
    const v = document.createElement('video');
    v.muted = true; v.playsInline = true; v.preload = 'auto'; v.crossOrigin = 'anonymous';
    stage.insertBefore(v, stage.querySelector('.vignette'));
    return v;
  });
  const cardNodes = COPY.map(c => {
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML = `<div class="eyebrow">${c.eyebrow}</div><h2>${c.title}</h2><p>${c.body}</p>`;
    cardsEl.appendChild(d);
    return d;
  });
  const totalW = SEGS.reduce((a, s) => a + s.w, 0);
  let acc = 0;
  const bounds = SEGS.map(s => { const a = acc / totalW; acc += s.w; return { a, b: acc / totalW }; });
  const railBtns = RAIL.map(r => {
    const b = document.createElement('button');
    b.title = r.label;
    b.onclick = () => {
      const total = document.getElementById('track').offsetHeight - innerHeight;
      const seg = bounds[r.seg];
      scrollTo({ top: (seg.a + (seg.b - seg.a) * 0.5) * total, behavior: 'smooth' });
    };
    rail.appendChild(b);
    return b;
  });
  let ready = false, loadedCount = 0;
  const totalLoads = VIDS.length + IMGS.length;
  function bump() {
    loadedCount++;
    lbar.style.width = Math.round(loadedCount / totalLoads * 100) + '%';
    if (loadedCount >= totalLoads) { lhint.textContent = 'Ready'; buildParade(); }
  }
  imgEls.forEach(im => im.decode().catch(() => {}).then(bump));
  (async () => {
    for (let i = 0; i < VIDS.length; i++) {
      try {
        const r = await fetch(CDN + VIDS[i].file, { mode: 'cors' });
        const b = await r.blob();
        vidEls[i].src = URL.createObjectURL(b);
        await new Promise(res => { vidEls[i].onloadedmetadata = res; setTimeout(res, 4000); });
      } catch (e) {}
      bump();
      if (i === 0 && !ready) { ready = true; loader.classList.add('done'); }
    }
    if (!ready) { ready = true; loader.classList.add('done'); }
  })();
  const FAR_CATS = ['b-detective','c-chef','b-scribe','c-professor','c-librarian','b-ops','c-aviator','d-mailcat','d-photographer','d-miner','d-fortune','e-beekeeper','e-lifeguard','e-gardener','e-archaeologist'];
  const NEAR_CATS = ['b-scientist','b-dev','c-judge','b-artist','c-guard','c-doctor','c-toolsmith','d-firefighter','d-referee','d-magician','d-banker','e-conductor','e-butler','e-operator','e-janitor'];
  let paradeBuilt = false;
  function buildParade() {
    if (paradeBuilt) return;
    paradeBuilt = true;
    document.querySelectorAll('#fparade .prow').forEach((row, ri) => {
      const names = ri === 0 ? FAR_CATS : NEAR_CATS;
      const tr = row.querySelector('.ptrack');
      [...names, ...names].forEach(n => {
        const im = document.createElement('img');
        im.src = n + '.webp'; im.alt = ''; im.decoding = 'async';
        tr.appendChild(im);
      });
    });
  }
  let targetP = 0, smoothP = 0, curLayer = null;
  const seekBusy = new Array(VIDS.length).fill(false);
  const seekPending = new Array(VIDS.length).fill(null);
  vidEls.forEach((v, i) => {
    v.addEventListener('seeking', () => { seekBusy[i] = true; });
    v.addEventListener('seeked', () => {
      seekBusy[i] = false;
      if (seekPending[i] !== null) { const t = seekPending[i]; seekPending[i] = null; safeSeek(i, t); }
    });
  });
  function safeSeek(i, t) {
    const v = vidEls[i];
    if (!v.duration) return;
    const ct = Math.min(Math.max(t, 0), v.duration - 0.03);
    if (seekBusy[i]) { seekPending[i] = ct; return; }
    if (Math.abs(v.currentTime - ct) > 0.001) v.currentTime = ct;
  }
  function show(el) {
    if (curLayer === el) return;
    imgEls.forEach(x => { x.style.opacity = x === el ? 1 : 0; });
    vidEls.forEach(x => { x.style.opacity = x === el ? 1 : 0; });
    curLayer = el;
  }
  function onScroll() {
    const total = document.getElementById('track').offsetHeight - innerHeight;
    targetP = Math.min(1, Math.max(0, scrollY / total));
  }
  addEventListener('scroll', onScroll, { passive: true });
  onScroll();
  const intro = document.getElementById('intro');
  document.getElementById('begin').onclick = () => {
    const total = document.getElementById('track').offsetHeight - innerHeight;
    const seg = bounds[2];
    scrollTo({ top: (seg.a + (seg.b - seg.a) * 0.6) * total, behavior: 'smooth' });
  };
  function frame() {
    smoothP += (targetP - smoothP) * 0.12;
    const p = smoothP;
    let si = 0;
    for (let i = 0; i < bounds.length; i++) if (p >= bounds[i].a) si = i;
    const seg = SEGS[si], bd = bounds[si];
    const local = Math.min(1, Math.max(0, (p - bd.a) / (bd.b - bd.a)));
    if (seg.img !== undefined) {
      show(imgEls[seg.img]);
    } else {
      const v = vidEls[seg.v];
      show(v);
      const dur = v.duration || VIDS[seg.v].dur;
      if (seg.hold) safeSeek(seg.v, seg.at === 0 ? 0.001 : dur);
      else safeSeek(seg.v, seg.dir === 1 ? local * dur : (1 - local) * dur);
      if (!seg.hold && local < 0.06 && seg.dir === 1) safeSeek(seg.v, 0.001);
    }
    cardNodes.forEach((cd, ci) => {
      const on = seg.card === ci && local > 0.12 && local < 0.92 && si < FIN_SEG;
      cd.classList.toggle('on', on);
    });
    if (si >= FIN_SEG - 3) buildParade();
    finale.classList.toggle('on', si >= FIN_SEG);
    intro.classList.toggle('off', p > 0.008);
    hint.classList.toggle('off', p < 0.012 || p > 0.06);
    let stop = 0;
    RAIL.forEach((r, i) => { if (si >= r.seg) stop = i; });
    railBtns.forEach((b, i) => b.classList.toggle('on', i === stop));
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
